<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orchestrator Chat</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app">

    <!-- ── 사이드바 ── -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <span class="logo-icon">◈</span>
        <span class="logo-text">Orchestrator</span>
      </div>
      <button class="new-chat-btn" id="new-chat-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 5v14M5 12h14"/>
        </svg>
        새 대화
      </button>
    </aside>

    <!-- ── 메인 영역 ── -->
    <div class="main-area">

      <header class="header">
        <span class="header-title">AI 어시스턴트</span>
        <div class="header-status" id="header-status"></div>
      </header>

      <main class="messages-area" id="messages-area">
        <!-- 웰컴 화면 -->
        <div class="welcome" id="welcome">
          <div class="welcome-icon">◈</div>
          <h2>무엇이든 물어보세요</h2>
          <p>웹 검색, URL 분석 등의 도구를 활용하여 실시간으로 답변드립니다.</p>
          <div class="suggestion-chips">
            <button class="chip" data-q="오늘 서울 날씨 알려줘">🌤 오늘 서울 날씨</button>
            <button class="chip" data-q="최근 AI 뉴스 요약해줘">📰 최근 AI 뉴스</button>
            <button class="chip" data-q="https://chatty.kr 이 사이트 뭐하는 곳이야?">🌐 URL 분석하기</button>
          </div>
        </div>
      </main>

      <footer class="input-area">
        <div class="input-wrapper">
          <textarea
            id="user-input"
            placeholder="메시지를 입력하세요... (Shift+Enter로 줄바꿈, Enter로 전송)"
            rows="1"
          ></textarea>
          <button class="send-btn" id="send-btn" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M12 19V5M5 12l7-7 7 7"/>
            </svg>
          </button>
        </div>
      </footer>

    </div><!-- /main-area -->
  </div><!-- /app -->

  <!-- 인용 툴팁 -->
  <div class="cite-tooltip" id="cite-tooltip">
    <div class="cite-tooltip-title" id="cite-tooltip-title"></div>
    <a class="cite-tooltip-url" id="cite-tooltip-url" target="_blank" rel="noopener noreferrer"></a>
  </div>

  <script src="app.js"></script>
</body>
</html>
