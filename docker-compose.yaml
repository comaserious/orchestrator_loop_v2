services:
  fastapi:
    build:
      context: .
      dockerfile: ./dockerfile
    container_name: chat-fastapi
    ports:
      - "8200:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - DUCKLING_URL=http://duckling:8000
    depends_on:
      - duckling
    restart: unless-stopped
    networks:
      - backend
      - loop-network

  duckling:
    image: rasa/duckling
    container_name: duckling
    restart: unless-stopped
    networks:
      - backend
      - loop-network
    expose: # 컨테이너간 내부 통신 목적이므로 ports 노출 대신 expose 로 사용
      - "8000"

networks:
  backend:
    driver: bridge
  loop-network:
    external: true


