services:
  fastapi:
    build:
      context: .
      dockerfile: ./dockerfile
    container_name: chat-fastapi
    ports:
      - "8200:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
    restart: always


